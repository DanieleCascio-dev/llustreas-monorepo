[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/sanctum/*"
  to = "https://api.letiziaragionedesign.com/sanctum/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://api.letiziaragionedesign.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
